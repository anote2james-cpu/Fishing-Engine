<script>
function getDepthZone(species, season, structure, lakeType, forage, wind, cloud, time, composition){

let hardBottom = composition === "Rock" || composition === "Gravel" || composition === "Shell";
let softBottom = composition === "Sand" || composition === "Clay";
let coverBottom = composition === "Grass" || composition === "Wood" || composition === "Brush";
  // OPEN WATER
  if (structure === "Open Water") {
    if (season === "Summer") return "15–30 ft suspended";
    if (season === "Winter") return "20–40 ft suspended";
    return "8–20 ft suspended";
  }

 // SMALLMOUTH
if (species === "Smallmouth") {

  // GREAT LAKES / ST CLAIR STYLE
  if(lakeType === "Great Lake" || lakeType === "Natural Smallmouth Flat Lake"){
  if(hardBottom && forage === "Goby"){
  if(season === "Summer") return "6–18 ft";
  if(season === "Fall") return "5–15 ft";
} 

    if(season === "Winter") return "20–40 ft";

    if(season === "Pre-Spawn") return "8–18 ft";

    if(season === "Spawn") return "3–10 ft";

    if(season === "Post-Spawn") return "6–15 ft";

    if(season === "Summer"){

      if(forage === "Goby") return "8–20 ft";

      if(wind === "Heavy" || cloud === "Overcast") return "5–15 ft";

      return "10–25 ft";
    }

    if(season === "Fall"){
      return "5–15 ft";
    }
  }

  // HIGHLAND / DEEP CLEAR LAKES
  if(lakeType === "Highland Reservoir" || lakeType === "Highland Smallmouth Lake"){

    if(season === "Winter") return "25–45 ft";

    if(season === "Pre-Spawn") return "12–25 ft";

    if(season === "Spawn") return "5–15 ft";

    if(season === "Post-Spawn") return "12–25 ft";

    if(season === "Summer"){

      if(time === "Morning" || time === "Evening"){
        return "10–20 ft";
      }

      return "18–35 ft";
    }

    if(season === "Fall"){
      return "8–20 ft";
    }
  }

  // DEFAULT SMALLMOUTH
  if (season === "Winter") return "20–40 ft";
  if (season === "Pre-Spawn") return "10–20 ft";
  if (season === "Spawn") return "3–10 ft";
  if (season === "Post-Spawn") return "10–20 ft";
  return "15–30 ft";
}

 // WALLEYE
if (species === "Walleye") {

  // GREAT LAKES / BIG WATER
  if(lakeType === "Great Lake"){
    if(season === "Winter") return "25–50 ft";
    if(season === "Pre-Spawn") return "10–25 ft";
    if(season === "Spawn") return "4–12 ft";
    if(season === "Post-Spawn") return "12–30 ft";

    if(season === "Summer"){
      if(time === "Morning" || time === "Evening" || time === "Night"){
        return "12–25 ft";
      }
      return "25–45 ft";
    }

    if(season === "Fall") return "10–30 ft";
  }

  // HIGHLAND RESERVOIRS
  if(lakeType === "Highland Reservoir"){
    if(season === "Winter") return "30–55 ft";
    if(season === "Pre-Spawn") return "12–25 ft";
    if(season === "Spawn") return "5–15 ft";
    if(season === "Post-Spawn") return "15–30 ft";

    if(season === "Summer"){
      if(time === "Night") return "8–20 ft";
      return "25–45 ft";
    }

    if(season === "Fall") return "12–30 ft";
  }

  // DEFAULT WALLEYE
  if (season === "Winter") return "25–50 ft";
  if (season === "Pre-Spawn") return "10–20 ft";
  if (season === "Spawn") return "5–15 ft";
  if (season === "Post-Spawn") return "15–30 ft";

  if(season === "Summer"){
    if(time === "Morning" || time === "Evening" || time === "Night"){
      return "10–25 ft";
    }
    return "20–40 ft";
  }

  if(season === "Fall") return "10–25 ft";

  return "20–40 ft";
}

  // CRAPPIE
if (species === "Crappie") {

  if(season === "Winter"){
    if(structure === "Timber" || structure === "Open Water") return "15–30 ft";
    return "12–25 ft";
  }

  if(season === "Pre-Spawn"){
    if(structure === "Docks" || structure === "Timber") return "6–15 ft";
    return "4–12 ft";
  }

  if(season === "Spawn"){
    if(structure === "Docks" || structure === "Timber") return "2–8 ft";
    return "1–6 ft";
  }

  if(season === "Post-Spawn"){
    if(structure === "Docks" || structure === "Timber") return "8–18 ft";
    return "6–15 ft";
  }

  if(season === "Summer"){
    if(time === "Morning" || time === "Evening") return "8–15 ft";
    if(structure === "Open Water" || structure === "Timber") return "12–25 ft";
    return "10–20 ft";
  }

  if(season === "Fall"){
    if(structure === "Open Water" || structure === "Timber") return "8–20 ft";
    return "6–15 ft";
  }

  return "10–20 ft";
}

  // LARGEMOUTH / DEFAULT
if (species === "Largemouth" || species === "Unknown") {

  // SHALLOW GRASS LAKES
  if(lakeType === "Shallow Grass Lake"){
    if(season === "Winter") return "4–10 ft";
    if(season === "Pre-Spawn") return "3–8 ft";
    if(season === "Spawn") return "1–5 ft";
    if(season === "Post-Spawn") return "3–8 ft";
    if(season === "Summer") return "4–12 ft";
    if(season === "Fall") return "2–8 ft";
  }

  // TVA GRASS LAKES
  if(lakeType === "TVA Grass Lake"){
    if(season === "Winter") return "8–18 ft";
    if(season === "Pre-Spawn") return "4–10 ft";
    if(season === "Spawn") return "1–6 ft";
    if(season === "Post-Spawn") return "4–12 ft";
    if(season === "Summer"){
      if(time === "Morning" || time === "Evening") return "3–10 ft";
      return "8–18 ft";
    }
    if(season === "Fall") return "2–10 ft";
  }

  // TVA LEDGE LAKES
  if(lakeType === "TVA Ledge Lake"){
    if(season === "Winter") return "12–25 ft";
    if(season === "Pre-Spawn") return "6–15 ft";
    if(season === "Spawn") return "1–6 ft";
    if(season === "Post-Spawn") return "6–15 ft";
    if(season === "Summer") return "12–25 ft";
    if(season === "Fall") return "4–12 ft";
  }

  // HIGHLAND RESERVOIRS
  if(lakeType === "Highland Reservoir"){
    if(season === "Winter") return "15–35 ft";
    if(season === "Pre-Spawn") return "8–18 ft";
    if(season === "Spawn") return "2–8 ft";
    if(season === "Post-Spawn") return "8–18 ft";
    if(season === "Summer"){
      if(time === "Morning" || time === "Evening") return "8–18 ft";
      return "15–30 ft";
    }
    if(season === "Fall") return "5–15 ft";
  }

  // DEFAULT LARGEMOUTH
  if (season === "Winter") return "15–30 ft";
  if (season === "Pre-Spawn") return "8–15 ft";
  if (season === "Spawn") return "2–6 ft";
  if (season === "Post-Spawn") return "8–15 ft";
  if (season === "Fall") return "5–15 ft";
  return "10–25 ft";
}
 
}
const lakeForage = {
 "Laurel River Lake":["Shad","Bluegill"],
 "Lake Cumberland":["Shad","Alewife"],
 "Wood Creek Lake":["Bluegill","Crawfish"],
 "Kentucky Lake":["Shad","Bluegill"],
 "Lake Chickamauga":["Shad","Bluegill"],
 "Dale Hollow Lake":["Shad","Bluegill"],
 "Lake Cherokee":["Shad","Herring"],
 "Norris Lake":["Shad","Herring"],
 "Lake St. Clair":["Perch","Goby"],
 "Lake Erie":["Goby","Perch","Shad"],
 "Guntersville Lake":["Shad","Bluegill"],
 "Lake Okeechobee":["Bluegill","Shiners"]
};
const lakeTypes = {
 "Laurel River Lake":"Highland Reservoir",
 "Lake Cumberland":"Highland Reservoir",
 "Wood Creek Lake":"Small Clear Lake",
 "Kentucky Lake":"TVA Ledge Lake",
 "Lake Chickamauga":"TVA Grass Lake",
 "Dale Hollow Lake":"Highland Smallmouth Lake",
 "Lake Cherokee":"Highland Reservoir",
 "Norris Lake":"Highland Reservoir",
 "Lake St. Clair":"Natural Smallmouth Flat Lake",
 "Lake Erie":"Great Lake",
 "Guntersville Lake":"TVA Grass Lake",
 "Lake Okeechobee":"Shallow Grass Lake",
 "Unknown Body of Water":"Unknown"
};
function applyLake(){
 let lake = document.getElementById("lake").value;
 let forageList = lakeForage[lake];

 if(Array.isArray(forageList)){
  document.getElementById("forage").value = forageList[0];
 }

 // Auto clarity defaults
 if (lake === "Lake Erie") document.getElementById("clarity").value = "Stained";
 if (lake === "Lake St. Clair") document.getElementById("clarity").value = "Clear";
}

function getSeason(t){

 if(t <= 45) return "Winter";

 if(t <= 58) return "Pre-Spawn";

 if(t <= 70) return "Spawn";

 if(t <= 78) return "Post-Spawn";

 if(t <= 88) return "Summer";

 return "Fall";
}

function getSpeciesSeason(species, t){

 if(species === "Walleye"){
   if(t <= 38) return "Winter";
   if(t <= 45) return "Pre-Spawn";
   if(t <= 50) return "Spawn";
   if(t <= 60) return "Post-Spawn";
   if(t <= 82) return "Summer";
   return "Fall";
 }

 if(species === "Crappie"){
   if(t <= 45) return "Winter";
   if(t <= 55) return "Pre-Spawn";
   if(t <= 65) return "Spawn";
   if(t <= 72) return "Post-Spawn";
   if(t <= 85) return "Summer";
   return "Fall";
 }

 if(species === "Smallmouth"){
   if(t <= 42) return "Winter";
   if(t <= 55) return "Pre-Spawn";
   if(t <= 65) return "Spawn";
   if(t <= 72) return "Post-Spawn";
   if(t <= 84) return "Summer";
   return "Fall";
 }

 // Largemouth and Unknown
 if(t <= 45) return "Winter";
 if(t <= 58) return "Pre-Spawn";
 if(t <= 70) return "Spawn";
 if(t <= 78) return "Post-Spawn";
 if(t <= 88) return "Summer";
 return "Fall";
}

 if(clarity==="Clear"){
   return [
     "Green Pumpkin",

   ];

   return [

   ];
 }

 ];
}

function getStatusColor(score){
  if(score >= 75) return "#22c55e"; // strong green
  if(score >= 55) return "#eab308"; // moderate yellow
  if(score >= 35) return "#f97316"; // low orange
  return "#ef4444"; // poor red
}
 
function getAggressionIndex(species, season, temp, pressure, cloud, wind, time, clarity){

 let score = 50;

 // Temperature / season metabolism
 if(season === "Winter") score -= 18;
 if(season === "Pre-Spawn") score += 6;
 if(season === "Spawn") score -= 4;
 if(season === "Post-Spawn") score += 4;
 if(season === "Summer") score += 6;

 // Pressure
 if(pressure === "Falling") score += 14;
 if(pressure === "Stable") score += 4;
 if(pressure === "Rising") score -= 14;

 // Sky / light
 if(cloud === "Overcast") score += 8;
 if(cloud === "Rainy") score += 10;
 if(cloud === "Sunny") score -= 5;

 // Wind
 if(wind === "Light") score += 4;
 if(wind === "Moderate") score += 8;
 if(wind === "Heavy") score -= 6;
 if(wind === "Calm") score -= 6;

 // Time of day
 if(time === "Morning" || time === "Evening") score += 8;
 if(time === "Midday") score -= 4;
 if(time === "Night"){
   if(species === "Walleye") score += 10;
   else score -= 2;
 }

 // Clarity
 if(clarity === "Stained") score += 4;
 if(clarity === "Dirty") score -= 2;
 if(clarity === "Clear" && cloud === "Sunny") score -= 6;

 // Species behavior tuning
 if(species === "Smallmouth") score += 4;
 if(species === "Walleye" && (time === "Morning" || time === "Evening" || time === "Night")) score += 6;
 if(species === "Crappie") score -= 4;

 score = Math.max(5, Math.min(95, score));

 let label = "Neutral";

 if(score >= 75) label = "High";
 else if(score >= 55) label = "Moderate";
 else if(score >= 35) label = "Low";
 else label = "Negative";

 return {
   score: score,
   label: label
 };
} 
function getMood(pressure, cloud){

 if(pressure==="Falling") return "Aggressive";
 if(cloud==="Overcast" || cloud==="Rainy") return "Active";
 if(pressure==="Rising") return "Sluggish";

 return "Neutral";
}
  
function getRetrieve(season,species){
 if(species==="Smallmouth") return "Drag or hop bottom";
 if(species==="Walleye") return "Slow lift-drop";
 if(species==="Crappie") return "Slow steady retrieve";
 if(season==="Winter") return "Dead stick / drag";
 if(season==="Pre-Spawn") return "Slow roll + pause";
 if(season==="Spawn") return "Target beds slow";
 if(season==="Post-Spawn") return "Medium reaction";
 if(season==="Fall") return "Fast-moving baitfish imitation";
 return "Fast aggressive retrieve";
}

function getAdaptiveRetrieve(lure, baseRetrieve, season, pressure, wind, clarity, aggression, stability){

 let retrieve = baseRetrieve;

 if(aggression.label === "High"){
   retrieve += " — speed it up, cover water, and trigger reaction bites.";
 }

 if(aggression.label === "Moderate"){
   retrieve += " — use a steady cadence with occasional pauses or direction changes.";
 }

 if(aggression.label === "Low"){
   retrieve += " — slow down, make precise casts, and add longer pauses.";
 }

 if(aggression.label === "Negative"){
   retrieve += " — dead slow. Let the bait sit longer and avoid overworking it.";
 }

 if(season === "Winter"){
   retrieve += " Cold water adjustment: use the slowest version of this retrieve.";
 }

 if(pressure === "Rising"){
   retrieve += " Rising pressure adjustment: keep it closer to cover or bottom.";
 }

 if(wind !== "Calm" && aggression.label !== "Negative"){
   retrieve += " Wind adjustment: use the wind to help create reaction strikes.";
 }

 if(clarity === "Clear"){
   retrieve += " Clear water adjustment: make longer casts and keep the bait natural.";
 }

 if(clarity === "Dirty"){
   retrieve += " Dirty water adjustment: use stronger vibration, contrast, or a bigger profile.";
 }

 if(stability.label === "Search Pattern"){
   retrieve += " Search adjustment: do not overwork dead water; keep moving until you contact fish.";
 }

 if(stability.label === "Stable"){
   retrieve += " Stable pattern adjustment: duplicate the same cast angle, depth, and cadence after a bite.";
 }

 return retrieve;
}
 
function getLocation(species,season,structure,wind,forage){
 let loc="";

 if(structure==="Open Water"){
   if(species==="Smallmouth") loc="Suspended smallmouth chasing bait";
   else if(species==="Walleye") loc="Suspended walleye in deeper water";
   else if(species==="Crappie") loc="Suspended crappie near bait schools";
   else loc="Suspended fish chasing bait in open water";

 }else if(species==="Smallmouth"){

 } else if(species==="Walleye"){

function pairLureDepth(lures, depthZone, species){

  return lures.map(lure => {

    if (lure.includes("Tube")) return `${lure} (drag/hop, ${depthZone})`;
    if (lure.includes("Jerkbait")) return `${lure} (suspend over ${depthZone})`;
if (lure.includes("Topwater")) return `${lure} (over shallow cover or visible bait activity)`;
    if (lure.includes("Swimbait")) return `${lure} (count down to ${depthZone})`;
    if (lure.includes("Jig")) return `${lure} (bottom in ${depthZone})`;
    if (lure.includes("Texas")) return `${lure} (slow crawl ${depthZone})`;

    if (lure.includes("Crank")) return `${lure} (deflect through ${depthZone})`;
    if (lure.includes("Minnow")) return `${lure} (hover in ${depthZone})`;

    return `${lure} (${depthZone})`;

  });
}

function getPatternStability(season, pressure, wind, cloud, forage, structure){

 let score = 50;

 // Stable seasons/patterns
 if(season === "Summer") score += 8;
 if(season === "Winter") score += 6;

 // More movement/searching seasons
 if(season === "Fall") score -= 10;
 if(season === "Pre-Spawn") score -= 4;

 // Weather influence
 if(pressure === "Stable") score += 12;
 if(pressure === "Falling") score -= 4;
 if(pressure === "Rising") score -= 8;

 if(wind === "Calm" || wind === "Light") score += 5;
 if(wind === "Heavy") score -= 10;

 if(cloud === "Sunny" || cloud === "Partly Cloudy") score += 4;
 if(cloud === "Rainy") score -= 6;

 // Forage influence
 if(forage === "Crawfish" || forage === "Goby") score += 8;
 if(forage === "Shad" || forage === "Alewife" || forage === "Herring") score -= 8;

 // Structure influence
 if(structure === "Docks" || structure === "Timber" || structure === "Drop-offs") score += 7;
 if(structure === "Open Water" || structure === "Flats") score -= 8;

 score = Math.max(20, Math.min(95, score));

 let label = "Moderate";

 if(score >= 75) label = "Stable";
 else if(score >= 55) label = "Moderate";
 else if(score >= 40) label = "Unstable";
 else label = "Search Pattern";

 return {
   score: score,
   label: label
 };
}
