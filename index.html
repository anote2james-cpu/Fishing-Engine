<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Engine V12 Core</title>
<link rel="manifest" href="manifest.json">
<style>
body{font-family:Arial;background:#061018;color:#fff;margin:0;padding:12px}
.card{background:#0f1c27;border-radius:14px;padding:14px;margin-bottom:12px}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;font-weight:bold}
.primary{background:#38bdf8;color:#000}
.small{font-size:13px;color:#cbd5e1}
.out{font-size:18px;font-weight:bold;margin:6px 0}
select{width:100%;padding:10px;margin-top:6px;border-radius:8px;background:#08141e;color:#fff}
.hidden{display:none}
</style>
</head>
<body>

<div class="card">
<h3>Quick Mode</h3>

<select id="lake">
<option>Laurel River Lake</option>
<option>Lake Cumberland</option>
<option>Wood Creek Lake</option>
<option>Kentucky Lake</option>
<option>Chickamauga</option>
<option>Dale Hollow</option>
<option>Cherokee</option>
<option>Norris</option>
<option>St. Clair</option>
<option>Erie</option>
<option>Guntersville</option>
<option>Okeechobee</option>
</select>

<select id="clarity"><option>Clear</option><option>Stained</option><option>Dirty</option></select>
<select id="depth"><option>Unknown</option><option>Shallow</option><option>Mid</option><option>Deep</option></select>
<select id="cover"><option>Rock</option><option>Grass</option><option>Wood</option><option>Open</option></select>

<button onclick="toggle()">Dial It In</button>

<div id="adv" class="hidden">
<select id="forage"><option value="">Forage?</option><option>Shad</option><option>Bluegill</option><option>Crawfish</option></select>
<select id="weather"><option value="">Weather?</option><option>Sunny</option><option>Cloudy</option><option>Post-Front</option></select>
<select id="wind"><option value="">Wind?</option><option>Calm</option><option>Windy</option></select>
</div>

<button class="primary" onclick="run()">THROW THIS</button>
</div>

<div id="out" class="card hidden"></div>

<script>
function toggle(){
 let a=document.getElementById("adv");
 a.classList.toggle("hidden");
}

function confidenceScore(){
 let score=50;
 if(document.getElementById("forage").value) score+=15;
 if(document.getElementById("weather").value) score+=10;
 if(document.getElementById("wind").value) score+=10;
 if(document.getElementById("depth").value!="Unknown") score+=15;
 return score;
}

function run(){
 let depth=document.getElementById("depth").value;
 let clarity=document.getElementById("clarity").value;
 let cover=document.getElementById("cover").value;
 let forage=document.getElementById("forage").value;
 let wind=document.getElementById("wind").value;

 let lure1="Swimbait",lure2="Jig",lure3="Ned Rig";

 if(forage=="Crawfish"){lure1="Jig";lure2="Crankbait";lure3="Ned Rig";}
 if(forage=="Bluegill"){lure1="Swim Jig";lure2="Texas Rig";lure3="Topwater";}

 let loc="Main point";
 if(wind=="Windy") loc="Wind-blown "+cover;
 if(depth=="Unknown") loc="Start 8–12 ft search";

 let color=clarity=="Dirty"?"Black/Blue":clarity=="Clear"?"Natural":"White";

 let conf=confidenceScore();

 let out=document.getElementById("out");
 out.innerHTML=`
<div class="out">WHERE: ${loc}</div>
<div class="out">TOP 3:</div>
<div class="small">1. ${lure1} – ${color}</div>
<div class="small">2. ${lure2}</div>
<div class="small">3. ${lure3}</div>
<div class="small">CONFIDENCE: ${conf}%</div>
`;
 out.classList.remove("hidden");
}
</script>

</body>
</html>
