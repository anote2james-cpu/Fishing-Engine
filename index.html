<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Engine V12 Elite</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#061018">
<style>
body{font-family:Arial;background:#061018;color:#fff;margin:0;padding:12px}
.card{background:#0f1c27;border-radius:14px;padding:14px;margin-bottom:12px}
button{width:100%;padding:16px;margin-top:10px;border:none;border-radius:12px;font-weight:bold;font-size:16px}
.primary{background:#38bdf8;color:#000}
.out{font-size:20px;font-weight:bold;margin:8px 0}
.small{font-size:14px;margin:4px 0;color:#cbd5e1}
.phase{color:#38bdf8;font-weight:bold;margin-bottom:6px}
select{width:100%;padding:12px;margin-top:6px;border-radius:10px;background:#08141e;color:#fff;border:1px solid #34536a}
</style>
</head>
<body>

<div class="card">
<h3>Quick Mode</h3>

<select id="lake">
<option>Generic Lake</option>
<option>Laurel River Lake (KY)</option>
<option>Lake St. Clair</option>
<option>Kentucky Lake</option>
<option>Guntersville</option>
<option>Dale Hollow</option>
<option>Table Rock</option>
<option>Ohio River</option>
</select>

<select id="clarity">
<option>Clear</option><option>Stained</option><option>Dirty</option>
</select>

<select id="depth">
<option>Unknown</option><option>Shallow</option><option>Mid</option><option>Deep</option>
</select>

<select id="cover">
<option>Rock</option><option>Grass</option><option>Wood</option><option>Open</option>
</select>

<select id="activity">
<option>Active</option><option>Neutral</option><option>Tough</option>
</select>

<select id="forage">
<option>Shad</option><option>Bluegill</option><option>Crawfish</option><option>Mixed</option>
</select>

<select id="weather">
<option>Sunny</option><option>Cloudy</option><option>Post-Front</option>
</select>

<select id="wind">
<option>Calm</option><option>Windy</option>
</select>

<button class="primary" onclick="run()">THROW THIS</button>
</div>

<div id="out" class="card" style="display:none"></div>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}

function run(){
 let lake=lakeEl.value;
 let clarity=clarityEl.value;
 let depth=depthEl.value;
 let cover=coverEl.value;
 let activity=activityEl.value;
 let forage=forageEl.value;
 let weather=weatherEl.value;
 let wind=windEl.value;

 let out=document.getElementById("out");
 out.style.display="block";

 if(depth=="Unknown"){
   out.innerHTML=`
   <div class="phase">SEARCH MODE</div>
   <div class="out">START: ${lake.includes("Laurel")?"10–20 ft":"8–12 ft"}</div>
   <div class="small">Focus wind-blown structure</div>
   <div class="small">Find bait first</div>`;
   return;
 }

 let lure="Jig";
 if(forage=="Shad") lure="Swimbait";
 if(forage=="Bluegill") lure="Swim Jig";
 if(forage=="Crawfish") lure="Jig / Craw";
 if(activity=="Tough") lure="Ned Rig / Drop Shot";

 let location="Main lake point";
 if(wind=="Windy") location="Wind-blown "+cover;
 if(weather=="Post-Front") location="Deeper "+cover;

 let color=clarity=="Dirty"?"Black/Blue":clarity=="Clear"?"Natural":"White";

 out.innerHTML=`
 <div class="phase">${lake}</div>
 <div class="out">THROW: ${lure} – ${color}</div>
 <div class="small">WHERE: ${location}</div>
 <div class="small">DEPTH: ${depth}</div>
 <div class="small">WHY: ${forage} + ${wind} + ${weather}</div>
 `;
}
</script>

</body>
</html>
