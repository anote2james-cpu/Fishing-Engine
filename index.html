<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Engine V10 Elite</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#061018">
<style>
body{font-family:Arial;background:#061018;color:#fff;margin:0;padding:10px}
.card{background:#0f1c27;border-radius:12px;padding:12px;margin-bottom:10px}
button{width:100%;padding:14px;margin-top:8px;border:none;border-radius:10px;font-weight:bold}
.primary{background:#38bdf8;color:#000}
.out{font-size:18px;font-weight:bold;margin:6px 0}
.small{font-size:14px;margin:4px 0}
.phase{color:#38bdf8;font-weight:bold}
</style>
</head>
<body>

<div class="card">
<h3>Quick Mode</h3>

<select id="lake">
<option>Generic Lake</option>
<option>Laurel River Lake (KY)</option>
</select>

<select id="clarity">
<option>Clear</option><option>Stained</option><option>Dirty</option>
</select>

<select id="depth">
<option>Unknown</option><option>Shallow</option><option>Mid</option><option>Deep</option>
</select>

<select id="cover">
<option>Rock</option><option>Grass</option><option>Wood</option><option>Open</option>
</select>

<select id="activity">
<option>Active</option><option>Neutral</option><option>Tough</option>
</select>

<button class="primary" onclick="run()">THROW THIS</button>
</div>

<div id="out" class="card" style="display:none"></div>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js');
}

function isLaurel(){
 return document.getElementById("lake").value.includes("Laurel");
}

function run(){
 let c=clarity.value;
 let d=depth.value;
 let co=cover.value;
 let a=activity.value;

 let out=document.getElementById("out");
 out.style.display="block";

 if(d=="Unknown"){
   if(isLaurel()){
     out.innerHTML=`
     <div class="phase">LAUREL SEARCH</div>
     <div class="out">THROW: Swimbait – Natural</div>
     <div class="small">START: 10–20 ft</div>
     <div class="small">Focus: points + suspended fish</div>`;
     return;
   }
   out.innerHTML=`
   <div class="phase">SEARCH MODE</div>
   <div class="out">THROW: Swimbait – White</div>
   <div class="small">START: 8–12 ft</div>`;
   return;
 }

 let lure="Jig";
 if(isLaurel()){
   lure = a=="Active"?"Swimbait":a=="Tough"?"Ned Rig":"Drop Shot";
 } else {
   if(a=="Tough") lure="Ned Rig";
   else if(co=="Rock") lure="Crankbait";
   else if(co=="Grass") lure="Swimbait";
 }

 let color=c=="Dirty"?"Black/Blue":c=="Clear"?"Natural":"White";

 out.innerHTML=`
 <div class="phase">${isLaurel()?"LAUREL MODE":"STANDARD MODE"}</div>
 <div class="out">THROW: ${lure} – ${color}</div>
 <div class="small">CAST: ${co}</div>
 <div class="small">DEPTH: ${d}</div>
 `;
}
</script>

</body>
</html>
