<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Engine V12 Elite</title>
<style>
body{font-family:Arial;background:#061018;color:#fff;margin:0;padding:12px}
.card{background:#0f1c27;border-radius:14px;padding:14px;margin-bottom:12px}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;font-weight:bold}
.primary{background:#38bdf8;color:#000}
.small{font-size:13px;color:#cbd5e1}
.out{font-size:18px;font-weight:bold;margin:6px 0}
select{width:100%;padding:10px;margin-top:6px;border-radius:8px;background:#08141e;color:#fff}
.hidden{display:none}
label{font-size:13px;color:#9fb3c8}
.note{font-size:12px;color:#7dd3fc;margin-top:6px}
img{width:100%;border-radius:8px;margin-top:6px}
</style>
</head>
<body>

<div class="card">
<h3>Fishing Engine V12 Elite</h3>

<label>Lake</label>
<select id="lake">
<option>Laurel River Lake</option>
<option>Lake Cumberland</option>
<option>St. Clair</option>
</select>

<label>Water Clarity</label>
<select id="clarity">
<option>Clear</option>
<option>Stained</option>
<option>Dirty</option>
</select>

<label>Wind</label>
<select id="wind">
<option>Calm</option>
<option>Moderate</option>
<option>Heavy</option>
</select>

<button class="primary" onclick="run()">THROW THIS</button>
</div>

<div id="out" class="card hidden"></div>

<script>

function run(){

 let clarity=document.getElementById("clarity").value;
 let wind=document.getElementById("wind").value;

 let lures=[
  {name:"Swimbait",img:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Fishing_lure_swimbait.jpg"},
  {name:"Jig",img:"https://upload.wikimedia.org/wikipedia/commons/5/5a/Jig_lure.jpg"},
  {name:"Ned Rig",img:"https://upload.wikimedia.org/wikipedia/commons/2/2a/Soft_plastic_lure.jpg"}
 ];

 if(clarity==="Dirty"){
  lures[0]={name:"Black/Blue Jig",img:lures[1].img};
 }

 let location = wind==="Calm" ? "Secondary points and break lines" : "Wind-blown points";

 let out=document.getElementById("out");
 out.innerHTML=`
<div class="out">WHERE: ${location}</div>
<div class="out">TOP 3:</div>

<div class="small">1. ${lures[0].name}</div>
<img src="${lures[0].img}">

<div class="small">2. ${lures[1].name}</div>
<img src="${lures[1].img}">

<div class="small">3. ${lures[2].name}</div>
<img src="${lures[2].img}">
`;

 out.classList.remove("hidden");
}

</script>
</body>
</html>
