<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Engine V12 Elite</title>
<style>
body{font-family:Arial;background:#061018;color:#fff;margin:0;padding:12px}
.card{background:#0f1c27;border-radius:14px;padding:14px;margin-bottom:12px}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;font-weight:bold}
.primary{background:#38bdf8;color:#000}
.small{font-size:13px;color:#cbd5e1}
.out{font-size:18px;font-weight:bold;margin:6px 0}
select{width:100%;padding:10px;margin-top:6px;border-radius:8px;background:#08141e;color:#fff}
.hidden{display:none}
label{font-size:13px;color:#9fb3c8}
.note{font-size:12px;color:#7dd3fc;margin-top:6px}
</style>
</head>
<body>

<div class="card">
<h3>Fishing Engine V12 Elite</h3>

<label>Lake</label>
<select id="lake" onchange="applyLake()">
<option>Unknown Body of Water</option>
<option>Laurel River Lake</option>
<option>Lake Cumberland</option>
<option>Wood Creek Lake</option>
<option>Kentucky Lake</option>
<option>Chickamauga</option>
<option>Dale Hollow</option>
<option>Cherokee</option>
<option>Norris</option>
<option>St. Clair</option>
<option>Erie</option>
<option>Guntersville</option>
<option>Okeechobee</option>
</select>

<div id="profileNote" class="note"></div>

<div id="depthGroup">
<label>Depth</label>
<select id="depth">
<option value="">Auto</option>
<option>Unknown</option>
<option>Shallow</option>
<option>Mid</option>
<option>Deep</option>
</select>
</div>

<div id="coverGroup">
<label>Cover</label>
<select id="cover">
<option value="">Auto</option>
<option>Rock</option>
<option>Grass</option>
<option>Wood</option>
<option>Open</option>
</select>
</div>

<button onclick="toggle()">Dial It In</button>

<div id="adv" class="hidden">

<label>Water Clarity</label>
<select id="clarity">
<option value="">Select...</option>
<option>Clear</option>
<option>Stained</option>
<option>Dirty</option>
</select>

<label>Forage</label>
<select id="forage">
<option value="">Auto</option>
<option>Shad</option>
<option>Bluegill</option>
<option>Crawfish</option>
<option>Perch</option>
<option>Goby</option>
<option>Frog</option>
<option>Mixed</option>
</select>

<label>Wind</label>
<select id="wind">
<option value="">Unknown</option>
<option>Calm</option>
<option>Light</option>
<option>Moderate</option>
<option>Heavy</option>
</select>

<label>Water Temperature</label>
<select id="temp">
<option value="">Unknown</option>
<option>Cold</option>
<option>Cool</option>
<option>Warm</option>
<option>Hot</option>
</select>

<label>Barometric Pressure</label>
<select id="pressure">
<option value="">Unknown</option>
<option>Rising</option>
<option>Stable</option>
<option>Falling</option>
</select>

<label>Structure</label>
<select id="structure">
<option value="">General</option>
<option>Points</option>
<option>Flats</option>
<option>Drop-offs</option>
<option>Weedlines</option>
<option>Docks</option>
<option>Timber</option>
<option>Open Water</option>
</select>

</div>

<button class="primary" onclick="run()">THROW THIS</button>
</div>

<div id="out" class="card hidden"></div>

<script>

const lakeProfiles = {
 "Laurel River Lake":{forage:"Shad",cover:"Rock",depth:"Mid"},
 "Lake Cumberland":{forage:"Shad",cover:"Rock",depth:"Mid"},
 "Wood Creek Lake":{forage:"Bluegill",cover:"Wood",depth:"Shallow"},
 "Kentucky Lake":{forage:"Shad",cover:"Grass",depth:"Mid"},
 "Chickamauga":{forage:"Shad",cover:"Grass",depth:"Shallow"},
 "Dale Hollow":{forage:"Shad",cover:"Rock",depth:"Deep"},
 "Cherokee":{forage:"Shad",cover:"Rock",depth:"Mid"},
 "Norris":{forage:"Shad",cover:"Rock",depth:"Deep"},
 "St. Clair":{forage:"Perch",cover:"Grass",depth:"Shallow"},
 "Erie":{forage:"Gobies",cover:"Rock",depth:"Mid"},
 "Guntersville":{forage:"Shad",cover:"Grass",depth:"Shallow"},
 "Okeechobee":{forage:"Bluegill",cover:"Grass",depth:"Shallow"}
};

function updateVisibility(){
 let lake = document.getElementById("lake").value;
 let isUnknown = lake === "Unknown Body of Water";
 document.getElementById("depthGroup").style.display = isUnknown ? "block" : "none";
 document.getElementById("coverGroup").style.display = isUnknown ? "block" : "none";
}

function applyLake(){
 let lake=document.getElementById("lake").value;
 updateVisibility();

 let note=document.getElementById("profileNote");

 if(lake !== "Unknown Body of Water"){
   let p=lakeProfiles[lake];
   document.getElementById("forage").value=p.forage;
   document.getElementById("cover").value=p.cover;
   document.getElementById("depth").value=p.depth;

   note.innerText = `Using ${lake} profile (${p.forage} • ${p.cover} • ${p.depth})`;
 } else {
   note.innerText = "";
 }
}

function toggle(){
 document.getElementById("adv").classList.toggle("hidden");
}

function run(){
 let clarity=document.getElementById("clarity").value||"Stained";
 let depth=document.getElementById("depth").value||"Mid";
 let cover=document.getElementById("cover").value||"Structure";
 let forage=document.getElementById("forage").value||"Shad";
 let wind=document.getElementById("wind").value;
 let pressure=document.getElementById("pressure").value;
 let temp=document.getElementById("temp").value;
 let structure=document.getElementById("structure").value||cover;

 let lures=["Swimbait","Jig","Ned Rig"];

 if(forage=="Crawfish") lures=["Jig","Crankbait","Ned Rig"];
 if(forage=="Bluegill") lures=["Swim Jig","Texas Rig","Topwater"];

 if(pressure=="Falling") lures.unshift("Reaction Bait");
 if(temp=="Cold") lures=["Jerkbait","Ned Rig","Drop Shot"];

 let location="Main structure";
 if(wind && wind!="Calm") location="Wind-blown "+structure;
 if(depth=="Unknown") location="Search 8–12 ft";

 let color=clarity=="Dirty"?"Black/Blue":clarity=="Clear"?"Natural":"White";

 let confidence=50;
 if(forage) confidence+=10;
 if(wind && wind!=="Unknown") confidence+=10;
 if(pressure && pressure!=="Unknown") confidence+=10;
 if(temp && temp!=="Unknown") confidence+=10;
 if(structure && structure!=="General") confidence+=10;
 if(depth && depth!=="Unknown") confidence+=10;
 confidence=Math.min(confidence,100);

 let out=document.getElementById("out");
 out.innerHTML=`
<div class="out">WHERE: ${location}</div>
<div class="out">TOP 3:</div>
<div class="small">1. ${lures[0]} – ${color}</div>
<div class="small">2. ${lures[1]}</div>
<div class="small">3. ${lures[2]}</div>
<div class="small">CONFIDENCE: ${confidence}%</div>
`;
 out.classList.remove("hidden");
}

applyLake();

</script>
</body>
</html>
