<html>

<body>

<button class="primary" onclick="run()">THROW THIS</button>

<div id="out" class="card"></div>

<script>
function getDepthZone(species, season, structure){

  // OPEN WATER
  if (structure === "Open Water") {
    if (season === "Summer") return "15–30 ft suspended";
    if (season === "Winter") return "20–40 ft suspended";
    return "8–20 ft suspended";
  }

  // SMALLMOUTH
  if (species === "Smallmouth") {
    if (season === "Winter") return "20–40 ft";
    if (season === "Pre-Spawn") return "10–20 ft";
    if (season === "Spawn") return "3–10 ft";
    if (season === "Post-Spawn") return "10–20 ft";
    return "15–30 ft";
  }

  // WALLEYE
  if (species === "Walleye") {
    if (season === "Winter") return "25–50 ft";
    if (season === "Pre-Spawn") return "10–20 ft";
    if (season === "Spawn") return "5–15 ft";
    if (season === "Post-Spawn") return "15–30 ft";
    return "20–40 ft";
  }

  // CRAPPIE
  if (species === "Crappie") {
    if (season === "Winter") return "15–25 ft";
    if (season === "Pre-Spawn") return "6–12 ft";
    if (season === "Spawn") return "2–6 ft";
    if (season === "Post-Spawn") return "8–15 ft";
    return "10–20 ft";
  }

  // LARGEMOUTH (default)
  if (season === "Winter") return "15–30 ft";
  if (season === "Pre-Spawn") return "8–15 ft";
  if (season === "Spawn") return "2–6 ft";
  if (season === "Post-Spawn") return "8–15 ft";
   if (season === "Fall") return "5–15 ft";
  return "10–25 ft";
 
}
const lakeForage = {
 "Laurel River Lake":["Shad","Bluegill"],
 "Lake Cumberland":["Shad","Alewife"],
 "Wood Creek Lake":["Bluegill","Crawfish"],
 "Kentucky Lake":["Shad","Bluegill"],
 "Lake Chickamauga":["Shad","Bluegill"],
 "Dale Hollow Lake":["Shad","Bluegill"],
 "Lake Cherokee":["Shad","Herring"],
 "Norris Lake":["Shad","Herring"],
 "Lake St. Clair":["Perch","Goby"],
 "Lake Erie":["Goby","Perch","Shad"],
 "Guntersville Lake":["Shad","Bluegill"],
 "Lake Okeechobee":["Bluegill","Shiners"]
};
const lakeTypes = {
 "Laurel River Lake":"Highland Reservoir",
 "Lake Cumberland":"Highland Reservoir",
 "Wood Creek Lake":"Small Clear Lake",
 "Kentucky Lake":"TVA Ledge Lake",
 "Lake Chickamauga":"TVA Grass Lake",
 "Dale Hollow Lake":"Highland Smallmouth Lake",
 "Lake Cherokee":"Highland Reservoir",
 "Norris Lake":"Highland Reservoir",
 "Lake St. Clair":"Natural Smallmouth Flat Lake",
 "Lake Erie":"Great Lake",
 "Guntersville Lake":"TVA Grass Lake",
 "Lake Okeechobee":"Shallow Grass Lake",
 "Unknown Body of Water":"Unknown"
};
function applyLake(){
 let lake = document.getElementById("lake").value;
 let forageList = lakeForage[lake];

 if(Array.isArray(forageList)){
  document.getElementById("forage").value = forageList[0];
 }

 // Auto clarity defaults
 if (lake === "Lake Erie") document.getElementById("clarity").value = "Stained";
 if (lake === "Lake St. Clair") document.getElementById("clarity").value = "Clear";
}

function getSeason(t){

 if(t <= 40) return "Winter";

 if(t <= 55) return "Pre-Spawn";

 if(t <= 68) return "Spawn";

 if(t <= 75) return "Post-Spawn";

 if(t <= 82) return "Summer";

 return "Fall";
}

function getColors(clarity){

 if(clarity==="Clear"){
   return [
     "Green Pumpkin",
     "Watermelon Red",
     "Ghost Shad",
     "Natural Perch",
     "Smoke"
   ];
 }

 if(clarity==="Stained"){
   return [
     "White",
     "Chartreuse Shad",
     "Green Pumpkin Purple",
     "Sexy Shad",
     "Fire Tiger"
   ];
 }

 return [
   "Black/Blue",
   "Junebug",
   "Black/Chartreuse",
   "Solid White",
   "Chartreuse"
 ];
}

function getMood(pressure, cloud){

 if(pressure==="Falling") return "Aggressive";
 if(cloud==="Overcast" || cloud==="Rainy") return "Active";
 if(pressure==="Rising") return "Sluggish";

 return "Neutral";
}
  
function getRetrieve(season,species){
 if(species==="Smallmouth") return "Drag or hop bottom";
 if(species==="Walleye") return "Slow lift-drop";
 if(species==="Crappie") return "Slow steady retrieve";
 if(season==="Winter") return "Dead stick / drag";
 if(season==="Pre-Spawn") return "Slow roll + pause";
 if(season==="Spawn") return "Target beds slow";
 if(season==="Post-Spawn") return "Medium reaction";
 if(season==="Fall") return "Fast-moving baitfish imitation";
 return "Fast aggressive retrieve";
}

function getLocation(species,season,structure,wind,forage){
 let loc="";

 if(structure==="Open Water"){
   if(species==="Smallmouth") loc="Suspended smallmouth chasing bait";
   else if(species==="Walleye") loc="Suspended walleye in deeper water";
   else if(species==="Crappie") loc="Suspended crappie near bait schools";
   else loc="Suspended fish chasing bait in open water";

 }else if(species==="Smallmouth"){
   loc="Rocky points, shoals, and current breaks";

 } else if(species==="Walleye"){
   loc="Deep bottom transitions";
 } else if(species==="Crappie"){
   loc="Brush, docks, suspended cover";
 } else {
   if(season==="Pre-Spawn") loc="Secondary points leading to flats";
   else if(season==="Spawn") loc="Shallow bedding areas";
   else if(season==="Post-Spawn") loc="First drop-offs";
   else if(season==="Summer") loc="Offshore structure / grass edges";
   else if(season==="Fall") loc="Shallow flats and baitfish-heavy areas";  
   else loc="Deep structure";
 }

 if(wind!=="Calm") loc="Wind-blown " + loc;
 if(forage==="Crawfish") loc+=" on rock";
 if(forage==="Shad") loc+=" near bait";

 return loc;
}
function adjustLocationForLakeType(location, lakeType, season, species){

 let extra = "";

 if(lakeType === "Highland Reservoir"){
   extra = " Focus on deep water access, bluff ends, channel swings, long tapering points, and clear-water transitions.";
 }

 if(lakeType === "Highland Smallmouth Lake"){
   extra = " Focus on rocky points, gravel transitions, offshore humps, and deep clear-water structure.";
 }

 if(lakeType === "TVA Ledge Lake"){
   extra = " Focus on river ledges, current breaks, shell beds, channel drops, and bait moving along the Tennessee River system.";
 }

 if(lakeType === "TVA Grass Lake"){
   extra = " Focus on grass edges, drains, flats, current seams, and wind-blown bait around vegetation.";
 }

 if(lakeType === "Natural Smallmouth Flat Lake"){
   extra = " Focus on flats, rock transitions, isolated boulders, scattered grass, and bait roaming across large shallow-to-mid-depth areas.";
 }

 if(lakeType === "Great Lake"){
   extra = " Focus on reefs, shoals, rock piles, breaklines, current seams, and bait schools.";
 }

 if(lakeType === "Shallow Grass Lake"){
   extra = " Focus on grass mats, reed edges, lanes, holes in vegetation, and bluegill/shiner activity.";
 }

 if(lakeType === "Small Clear Lake"){
   extra = " Focus on shade, docks, brush, subtle depth changes, and clean hard-bottom areas.";
 }

 return location + extra;
}
function getSeasonalMigration(season, species, lakeType){

 let migration = "";

 if(species === "Largemouth"){
   if(season === "Winter") migration = "Winter pattern: start near the deepest available cover, channel bends, bluff banks, or vertical structure close to bait.";
   if(season === "Pre-Spawn") migration = "Pre-spawn pattern: fish are moving from wintering areas toward spawning flats. Start on secondary points, channel swings, and staging cover.";
   if(season === "Spawn") migration = "Spawn pattern: look for protected shallow pockets, hard bottom, beds, and cover near spawning flats.";
   if(season === "Post-Spawn") migration = "Post-spawn pattern: fish are recovering near the first break, bluegill beds, shade, and cover close to spawning areas.";
   if(season === "Summer") migration = "Summer pattern: look offshore on ledges, grass edges, deeper points, brush piles, docks, and areas with bait or current.";
   if(season === "Fall") migration = "Fall pattern: follow baitfish into creeks, pockets, shallow flats, and wind-blown banks.";
 }

 if(species === "Smallmouth"){
   if(season === "Winter") migration = "Winter pattern: smallmouth often hold deeper on rock, humps, bluff ends, and vertical structure near bait.";
   if(season === "Pre-Spawn") migration = "Pre-spawn pattern: smallmouth stage on rocky points, gravel transitions, shoals, and breaks close to spawning areas.";
   if(season === "Spawn") migration = "Spawn pattern: look for gravel, sand, rock transitions, protected bays, and shallow flats near deeper water.";
   if(season === "Post-Spawn") migration = "Post-spawn pattern: fish slide back to points, shoals, breaks, and roam near bait.";
   if(season === "Summer") migration = "Summer pattern: focus on offshore rock, humps, deep grass edges, current breaks, and suspended bait.";
   if(season === "Fall") migration = "Fall pattern: smallmouth chase bait across flats, points, shoals, rock transitions, and wind-blown areas.";
 }

 if(species === "Walleye"){
   if(season === "Winter") migration = "Winter pattern: look deeper near basin edges, channel drops, bait schools, and slow-moving presentations.";
   if(season === "Pre-Spawn") migration = "Pre-spawn pattern: walleye move toward gravel, current, neck-down areas, and spawning approaches.";
   if(season === "Spawn") migration = "Spawn pattern: focus on rocky shorelines, gravel, current areas, and shallow spawning zones during low light.";
   if(season === "Post-Spawn") migration = "Post-spawn pattern: fish recover near nearby breaks, flats, and transition zones before sliding deeper.";
   if(season === "Summer") migration = "Summer pattern: focus on deeper structure, trolling lanes, points, humps, and baitfish schools.";
   if(season === "Fall") migration = "Fall pattern: walleye follow bait into shallower feeding areas, wind-blown points, and night-feeding zones.";
 }

 if(species === "Crappie"){
   if(season === "Winter") migration = "Winter pattern: crappie group up deeper near brush, creek channels, standing timber, and bait.";
   if(season === "Pre-Spawn") migration = "Pre-spawn pattern: crappie move toward coves, creek arms, brush, docks, and staging timber.";
   if(season === "Spawn") migration = "Spawn pattern: look shallow around brush, stake beds, docks, grass, and protected banks.";
   if(season === "Post-Spawn") migration = "Post-spawn pattern: fish scatter first, then regroup around docks, brush, timber, and nearby breaks.";
   if(season === "Summer") migration = "Summer pattern: target deeper brush, shaded docks, bridge pilings, timber, and suspended schools.";
   if(season === "Fall") migration = "Fall pattern: crappie follow bait into creek arms, brush piles, docks, and channel edges.";
 }

 if(species === "Unknown"){
   if(season === "Winter") migration = "Winter pattern: start deeper and slower near bait, vertical structure, and the most stable water.";
   if(season === "Pre-Spawn") migration = "Pre-spawn pattern: start on staging areas between deep winter water and shallow spawning flats.";
   if(season === "Spawn") migration = "Spawn pattern: check protected shallow areas with cover, hard bottom, and warmer water.";
   if(season === "Post-Spawn") migration = "Post-spawn pattern: start near the first break outside spawning areas and around available shade or bait.";
   if(season === "Summer") migration = "Summer pattern: look for shade, current, offshore structure, grass edges, deeper water, or bait schools.";
   if(season === "Fall") migration = "Fall pattern: follow bait into creeks, pockets, flats, and wind-blown areas.";
 }

 return migration;
}
function getForageBehavior(forage, season, lakeType){

 let behavior = "";

 if(forage === "Shad"){
   if(season === "Winter") behavior = "Forage behavior: shad often group up deeper and suspend near stable water and bait schools.";
   if(season === "Pre-Spawn") behavior = "Forage behavior: shad begin moving toward warming pockets, creek arms, and wind-blown banks.";
   if(season === "Spawn") behavior = "Forage behavior: shad may move shallow around cover, riprap, and hard edges, especially early and late.";
   if(season === "Post-Spawn") behavior = "Forage behavior: shad activity increases near points, shade, and shallow-to-mid-depth feeding areas.";
   if(season === "Summer") behavior = "Forage behavior: shad often suspend offshore, relate to current, or group around ledges, points, and deeper structure.";
   if(season === "Fall") behavior = "Forage behavior: shad push shallow into creeks, pockets, flats, and wind-blown banks.";
 }

 if(forage === "Bluegill"){
   if(season === "Winter") behavior = "Forage behavior: bluegill tend to hold tighter to cover, deeper grass, brush, or protected areas.";
   if(season === "Pre-Spawn") behavior = "Forage behavior: bluegill move gradually toward shallower cover as water warms.";
   if(season === "Spawn") behavior = "Forage behavior: bluegill become important around shallow cover, beds, docks, and grass.";
   if(season === "Post-Spawn") behavior = "Forage behavior: bluegill beds and shallow cover can create strong feeding opportunities.";
   if(season === "Summer") behavior = "Forage behavior: bluegill stay around grass, docks, shade, shallow cover, and edges.";
   if(season === "Fall") behavior = "Forage behavior: bluegill remain cover-oriented but may shift with cooling water and bait movement.";
 }

 if(forage === "Crawfish"){
   if(season === "Winter") behavior = "Forage behavior: crawfish activity is reduced, so slow bottom contact is usually better.";
   if(season === "Pre-Spawn") behavior = "Forage behavior: crawfish become more active as the water warms, especially around rock and hard bottom.";
   if(season === "Spawn") behavior = "Forage behavior: crawfish stay bottom-oriented around rock, gravel, and cover.";
   if(season === "Post-Spawn") behavior = "Forage behavior: crawfish patterns remain strong around rock, points, and hard-bottom transitions.";
   if(season === "Summer") behavior = "Forage behavior: crawfish are usually best around rock, shade, grass edges, and bottom irregularities.";
   if(season === "Fall") behavior = "Forage behavior: crawfish can still matter, but baitfish patterns often become stronger.";
 }

 if(forage === "Goby"){
   behavior = "Forage behavior: gobies stay bottom-oriented around rock, gravel, sand transitions, and hard-bottom areas. Keep baits close to bottom.";
 }

 if(forage === "Perch"){
   behavior = "Forage behavior: perch often roam in groups around grass edges, flats, rock transitions, and bait-rich areas.";
 }

 if(forage === "Alewife" || forage === "Herring"){
   behavior = "Forage behavior: alewife/herring are open-water baitfish. Look for suspended fish, points, deep water access, wind, and bait schools.";
 }

 if(forage === "Shiners"){
   behavior = "Forage behavior: shiners often relate to shallow vegetation, clean water, edges, holes, and roaming predator activity.";
 }

 if(forage === "Mixed"){
   behavior = "Forage behavior: mixed forage means you should let conditions decide. Use baitfish patterns in wind/clouds and bottom-contact patterns around rock or cover.";
 }

 return behavior;
}
function getFeedingWindow(time, pressure, cloud, wind, season){

 let window = "";

 if(time === "Morning"){
   window = "Feeding window: morning is usually a strong feeding window, especially around shallow cover, bait activity, shade, or wind.";
 }

 if(time === "Evening"){
   window = "Feeding window: evening often improves the bite as light gets lower and bait moves shallower.";
 }

 if(time === "Midday"){
   window = "Feeding window: midday can be tougher, especially in clear water or bright sun. Focus on shade, deeper edges, current, or slower presentations.";
 }

 if(time === "Night"){
   window = "Feeding window: night fishing favors low-light predators, shallow movement, dark silhouettes, vibration, and slower target-oriented presentations.";
 }

 if(pressure === "Falling"){
   window += " Falling pressure usually improves activity and can make fish more willing to chase.";
 }

 if(pressure === "Rising"){
   window += " Rising pressure usually makes fish tighter to cover and more cautious, so slow down.";
 }

 if(cloud === "Overcast" || cloud === "Rainy"){
   window += " Cloud cover can extend the bite window and make moving baits stronger.";
 }

 if(wind !== "Calm"){
   window += " Wind can position bait and make fish more aggressive on wind-blown areas.";
 }

 if(wind === "Calm" && cloud === "Sunny"){
   window += " Calm, sunny conditions usually call for finesse, shade, deeper water, or precise casts.";
 }

 if(season === "Winter"){
   window += " In winter, the best window is often shorter, so slow presentations and stable areas matter more.";
 }

 if(season === "Fall"){
   window += " In fall, feeding windows can be strong but bait movement is the key.";
 }

 return window;
}
  
function getLures(species){
  if(species==="Unknown") return ["Swimbait","Jig","Crankbait"];
 if(species==="Smallmouth") return ["Ned Rig","Tube","Jerkbait"];
 if(species==="Walleye") return ["Jig","Crankbait","Minnow Rig"];
 if(species==="Crappie") return ["Jig","Minnow","Small Swimbait"];
return [
 "Swimbait",
 "Jig",
 "Texas Rig",
 "Spinnerbait",
 "Chatterbait",
 "Crankbait",
 "Topwater",
 "Carolina Rig"];
}
function matchColorsToLure(lure, clarity, forage){

 let baseColors = getColors(clarity);
if(lure.includes("Topwater")) return ["Black","Bone","White"];
 if(forage === "Goby"){
   return ["Green Pumpkin", "Goby", "Brown", "Smoke Purple", "Watermelon"];
 }

 if(forage === "Perch"){
   return ["Natural Perch", "Green Pumpkin Orange", "Gold", "Fire Tiger"];
 }

 if(forage === "Crawfish"){
   return ["Green Pumpkin", "Brown Orange", "Black/Blue", "Craw"];
 }

 if(forage === "Bluegill"){
   return ["Green Pumpkin", "Watermelon Red", "Bluegill", "Junebug"];
 }

 if(forage === "Shad" || forage === "Alewife" || forage === "Herring"){
   if(lure.includes("Swimbait")) return ["White", "Pearl", "Shad", "Silver"];
   if(lure.includes("Jerkbait")) return ["Ghost Shad", "Pro Blue", "Silver", "Pearl"];
   return ["White", "Sexy Shad", "Chrome", "Pearl"];
 }

 if(forage === "Shiners"){
   return ["Gold", "Silver", "Pearl", "Natural Minnow"];
 }

 if(lure.includes("Jig")) return baseColors;
 if(lure.includes("Swimbait")) return ["White","Shad","Silver"];
 if(lure.includes("Crankbait")) return ["Chartreuse","Sexy Shad","Fire Tiger"];
 

 return baseColors;
}

function pairLureDepth(lures, depthZone, species){

  return lures.map(lure => {

    if (lure.includes("Ned")) return `${lure} (bottom contact, ${depthZone})`;
    if (lure.includes("Tube")) return `${lure} (drag/hop, ${depthZone})`;
    if (lure.includes("Jerkbait")) return `${lure} (suspend over ${depthZone})`;
if (lure.includes("Topwater")) return `${lure} (over shallow cover or visible bait activity)`;
    if (lure.includes("Swimbait")) return `${lure} (count down to ${depthZone})`;
    if (lure.includes("Jig")) return `${lure} (bottom in ${depthZone})`;
    if (lure.includes("Texas")) return `${lure} (slow crawl ${depthZone})`;

    if (lure.includes("Crank")) return `${lure} (deflect through ${depthZone})`;
    if (lure.includes("Minnow")) return `${lure} (hover in ${depthZone})`;

    return `${lure} (${depthZone})`;

  });
}
  function adjustLuresForStructure(lures, structure) {

  return lures.map(lure => {

    // GRASS / WEEDLINES
    if (structure === "Weedlines") {
      if (lure.includes("Jig")) return "Swim Jig";
      if (lure.includes("Texas")) return "Texas Rig (weedless)";
      if (lure.includes("Swimbait")) return "Weedless Swimbait";
    }

    // ROCK / POINTS / DROP-OFFS
    if (structure === "Points" || structure === "Drop-offs") {
      if (lure.includes("Jig")) return "Football Jig";
      if (lure.includes("Tube")) return "Tube (rock drag)";
      if (lure.includes("Ned")) return "Ned Rig (bottom contact)";
    }

    // WOOD / DOCKS / TIMBER
    if (structure === "Docks" || structure === "Timber") {
      if (lure.includes("Jig")) return "Flipping Jig";
      if (lure.includes("Texas")) return "Texas Rig (pitching)";
    }

    // OPEN WATER
    if (structure === "Open Water") {
      if (lure.includes("Swimbait")) return "Paddle Tail Swimbait";
      if (lure.includes("Jerkbait")) return "Suspending Jerkbait";
      if (lure.includes("Minnow")) return "Live Minnow / Hover Rig";
    }

    return lure;

  });
}
 function getRetrieveByLure(lure, season, species){

 let clean = lure.toLowerCase();

 if(clean.includes("jerkbait")) return "Snap-pause, then let it suspend";
 if(clean.includes("ned")) return "Slow drag with small hops";
 if(clean.includes("tube")) return "Drag, hop, and pause on bottom";
 if(clean.includes("football jig")) return "Slow drag across rock or hard bottom";
 if(clean.includes("flipping jig")) return "Pitch tight to cover and let it fall vertically";
 if(clean.includes("swim jig")) return "Steady swim with light twitches";
 if(clean.includes("texas")) return "Slow crawl, shake, and pause";
 if(clean.includes("crankbait")) return "Deflect off cover with stop-and-go retrieve";
 if(clean.includes("swimbait")) return "Steady retrieve through the strike zone";
 if(clean.includes("topwater")) return "Pause between twitches or walking cadence";
 if(clean.includes("minnow")) return "Slow hover or lift-drop presentation";

 return getRetrieve(season, species);
} 
function getLureRole(index, lure, mood){

 if(index === 0){
   return "PRIMARY — best starting bait";
 }

 if(index === 1){
   if(mood === "Aggressive" || mood === "Active"){
     return "SECONDARY — active fish option";
   }
   return "SECONDARY — alternate presentation";
 }

 if(index === 2){
   if(mood === "Sluggish"){
     return "FALLBACK — tough bite backup";
   }
   return "FALLBACK — change-up bait";
 }

 return "OPTION";
}
function getAvoidPatterns(species, season, structure, time, pressure, cloud, wind, forage){

 let avoids = [];

 if(season === "Winter"){
   avoids.push("Avoid fast, shallow presentations unless you see active bait or feeding fish.");
 }

 if(season === "Winter" && structure === "Flats"){
   avoids.push("Avoid spending too much time on featureless flats in cold water.");
 }

 if(time === "Midday" && cloud === "Sunny" && pressure === "Rising"){
   avoids.push("Avoid random shallow casting. Focus on shade, cover, deeper edges, or slower presentations.");
 }

 if(wind === "Calm" && cloud === "Sunny"){
   avoids.push("Avoid noisy power fishing unless fish are visibly chasing bait.");
 }

 if(species === "Smallmouth" && structure === "Weedlines"){
   avoids.push("Avoid treating weedlines as the primary smallmouth pattern unless rock, bait, or scattered grass is nearby.");
 }

 if(species === "Walleye" && time === "Midday" && cloud === "Sunny"){
   avoids.push("Avoid shallow bright-water walleye patterns during midday unless wind, current, or stained water is present.");
 }

 if(species === "Crappie" && structure === "Open Water"){
   avoids.push("Avoid searching open water randomly. Look for bait balls, suspended schools, brush, timber, or bridge structure.");
 }

 if(forage === "Goby" || forage === "Crawfish"){
   if(structure === "Open Water"){
     avoids.push("Avoid staying too high in the water column when the main forage is bottom-oriented.");
   }
 }

 if(forage === "Shad" && season === "Fall"){
   avoids.push("Avoid dead water with no bait. In fall, bait presence matters more than the bank itself.");
 }

 if(avoids.length === 0){
   avoids.push("No major red flags. Fish the recommended pattern, but adjust quickly if bait or bites are missing.");
 }

 return avoids;
}
function getFishingStyle(mood, pressure, cloud, wind, season, clarity){

 let style = "Balanced approach";

 if(mood === "Aggressive" || mood === "Active"){
   style = "Power fish first — cover water with moving baits.";
 }

 if(mood === "Sluggish"){
   style = "Finesse first — slow down and pick apart high-percentage targets.";
 }

 if(pressure === "Rising"){
   style = "Finesse first — rising pressure usually makes fish tighter and less willing to chase.";
 }

 if(wind !== "Calm" && (cloud === "Overcast" || cloud === "Rainy")){
   style = "Power fish — wind and cloud cover favor moving baits and reaction strikes.";
 }

 if(wind === "Calm" && cloud === "Sunny"){
   style = "Finesse fish — calm, bright conditions usually require slower, more precise presentations.";
 }

 if(season === "Winter"){
   style = "Finesse / slow presentation — cold water usually rewards patience and bottom contact.";
 }

 if(season === "Fall" && wind !== "Calm"){
   style = "Power fish — cover water and follow baitfish movement.";
 }

 if(clarity === "Dirty" && wind !== "Calm"){
   style = "Power fish with vibration, flash, or a larger profile.";
 }

 return style;
}  
 function getMapSearchGuidance(lakeType, season, species, structure, forage){

 let guidance = "";

 if(lakeType === "Highland Reservoir"){
   guidance = "Map search: look for long points, bluff ends, channel swings, creek mouths, and deep water close to shallow feeding areas.";
 }

 if(lakeType === "Highland Smallmouth Lake"){
   guidance = "Map search: look for rocky points, humps, gravel flats, bluff ends, and transitions near deep clear water.";
 }

 if(lakeType === "TVA Ledge Lake"){
   guidance = "Map search: look for river ledges, shell beds, channel drops, current breaks, creek mouths, and offshore bars.";
 }

 if(lakeType === "TVA Grass Lake"){
   guidance = "Map search: look for grass edges, drains, flats near channels, outside grass lines, current seams, and wind-blown vegetation.";
 }

 if(lakeType === "Natural Smallmouth Flat Lake"){
   guidance = "Map search: look for flats with rock transitions, isolated boulders, scattered grass, shoals, and nearby bait movement.";
 }

 if(lakeType === "Great Lake"){
   guidance = "Map search: look for reefs, shoals, rock piles, breaklines, current seams, and bait schools.";
 }

 if(lakeType === "Shallow Grass Lake"){
   guidance = "Map search: look for grass mats, reed lines, holes, lanes, clean bottom patches, and bluegill or shiner activity.";
 }

 if(lakeType === "Small Clear Lake"){
   guidance = "Map search: look for docks, shade lines, brush, subtle depth changes, hard bottom, and edges close to deeper water.";
 }

 if(lakeType === "Unknown"){
   guidance = "Map search: start with the most obvious high-percentage areas: points, creek mouths, visible cover, shade, depth changes, and bait activity.";
 }

 if(season === "Pre-Spawn"){
   guidance += " Prioritize routes between deep winter water and shallow spawning flats.";
 }

 if(season === "Spawn"){
   guidance += " Prioritize protected pockets, flats, hard bottom, and areas shielded from heavy wind.";
 }

 if(season === "Post-Spawn"){
   guidance += " Prioritize the first break outside spawning areas, shade, bluegill beds, and nearby bait.";
 }

 if(season === "Summer"){
   guidance += " Prioritize shade, current, offshore structure, grass edges, thermocline depth, and bait schools.";
 }

 if(season === "Fall"){
   guidance += " Prioritize bait first — creeks, pockets, flats, wind-blown banks, and baitfish migration routes.";
 }

 if(forage === "Goby" || forage === "Crawfish"){
   guidance += " Since the forage is bottom-oriented, focus on hard bottom, rock, gravel, shell, or transitions.";
 }

 if(forage === "Shad" || forage === "Alewife" || forage === "Herring"){
   guidance += " Since the forage is baitfish-oriented, use electronics or visual activity to find schools before committing.";
 }

 return guidance;
} 
  
function run(){
  let lake=document.getElementById("lake").value;
 let species=document.getElementById("species").value;
 let temp=parseFloat(document.getElementById("temp").value)||60;
 let clarity=document.getElementById("clarity").value;
 let wind=document.getElementById("wind").value;
 let structure=document.getElementById("structure").value;
 let forage=document.getElementById("forage").value;
let time=document.getElementById("time").value;
let pressure = document.getElementById("pressure").value;
let cloud = document.getElementById("cloud").value;  
  let viewMode=document.getElementById("viewMode").value;
 let season=getSeason(temp);
 let lakeType = lakeTypes[lake] || "Unknown";
 
 let location=getLocation(species,season,structure,wind,forage);
location = adjustLocationForLakeType(location, lakeType, season, species);
let migration = getSeasonalMigration(season, species, lakeType);
let forageBehavior = getForageBehavior(forage, season, lakeType);
let feedingWindow = getFeedingWindow(time, pressure, cloud, wind, season);
let depthZone = getDepthZone(species, season, structure);

if(structure==="Weedlines" && season!=="Winter"){
 depthZone = "3–10 ft";
}
let mood = getMood(pressure, cloud);
let fishingStyle = getFishingStyle(mood, pressure, cloud, wind, season, clarity);  
let mapGuidance = getMapSearchGuidance(lakeType, season, species, structure, forage); 
let avoidPatterns = getAvoidPatterns(species, season, structure, time, pressure, cloud, wind, forage);

let lures=getLures(species);
if(time === "Morning" || time === "Evening"){
  if(species === "Largemouth" && season !== "Winter"){
    lures.unshift("Topwater");
  }
}
lures = adjustLuresForStructure(lures, structure);
lures = lures.slice(0, 3);
lures = pairLureDepth(lures, depthZone, species);
  let retrieve = getRetrieveByLure(lures[0], season, species);
let colors = [
  ...matchColorsToLure(lures[0], clarity, forage),
  ...matchColorsToLure(lures[1], clarity, forage),
  ...matchColorsToLure(lures[2], clarity, forage)
];

// remove duplicates
colors = [...new Set(colors)];
 let avoidText = avoidPatterns.map(item => `<div class="small">• ${item}</div>`).join(""); 
 let confidence = 45;

 
// INPUT COMPLETENESS
if (species && species !== "Unknown") confidence += 10;
if (temp) confidence += 10;

if (wind && wind !== "Calm") confidence += 5;
if(forage === "Goby" && species === "Smallmouth") confidence += 8;
if(forage === "Crawfish" && (structure === "Points" || structure === "Drop-offs")) confidence += 6;
if(forage === "Shad" && (structure === "Open Water" || structure === "Flats")) confidence += 6;
if(structure === "Weedlines" && species === "Largemouth") confidence += 6;
if(structure === "Docks" && species === "Largemouth") confidence += 5;
if(structure === "Open Water" && species === "Smallmouth") confidence += 5;

// CONDITION QUALITY
if (pressure === "Falling") confidence += 5;
if (cloud === "Overcast" || cloud === "Rainy") confidence += 5;
  
// TIME OF DAY
if(time === "Morning" || time === "Evening") confidence += 5;
if(time === "Midday" && season === "Summer") confidence -= 3;
if(time === "Night" && species === "Walleye") confidence += 5;
if(time === "Night" && species === "Crappie") confidence += 3;
// SEASON ALIGNMENT BONUS
if (season === "Pre-Spawn" || season === "Fall") confidence += 5;

// PENALTIES
if (pressure === "Rising") confidence -= 5;
if (wind === "Calm") confidence -= 3;
  
// STRUCTURE + SPECIES MISMATCH PENALTIES
if (species === "Smallmouth" && structure === "Weedlines") confidence -= 8;
if (species === "Walleye" && structure === "Flats") confidence -= 8;
if (species === "Crappie" && structure === "Open Water") confidence -= 6;
  
// CLAMP RANGE
confidence = Math.max(40, Math.min(95, confidence));

let quickOutput = `
<div class="out">TARGET: ${species}</div>
<div class="out">PATTERN: ${season} ${species} pattern</div>
<div class="small">LAKE TYPE: ${lakeType}</div>
<div class="out">WHERE: ${location}</div>
<div class="small">DEPTH: ${depthZone}</div>
<div class="small">STYLE: ${fishingStyle}</div>
<div class="small">MAP: ${mapGuidance}</div>
<div class="small">WATCH OUT: ${avoidPatterns[0]}</div>
<div class="out">THROW:</div>

<div class="small">${getLureRole(0, lures[0], mood)}<br>1. ${lures[0]}</div>
<img src="${getImage(lures[0].split(' (')[0])}">

<div class="small">${getLureRole(1, lures[1], mood)}<br>2. ${lures[1]}</div>

<div class="small">${getLureRole(2, lures[2], mood)}<br>3. ${lures[2]}</div>

<div class="small">COLORS: ${colors.join(" • ")}</div>
<div class="small">RETRIEVE: ${retrieve}</div>
<div class="small">CONFIDENCE: ${confidence}%</div>
`;

let detailedOutput = `
<div class="out">TARGET: ${species}</div>
<div class="out">SEASON: ${season}</div>
<div class="small">LAKE TYPE: ${lakeType}</div>
<div class="out">WHERE: ${location}</div>
<div class="small">SEASONAL MOVEMENT: ${migration}</div>
<div class="small">FORAGE BEHAVIOR: ${forageBehavior}</div>
<div class="small">FEEDING WINDOW: ${feedingWindow}</div>
<div class="small">FISHING STYLE: ${fishingStyle}</div>
<div class="small">MAP SEARCH: ${mapGuidance}</div>
<div class="out">AVOID:</div>
${avoidText}
<div class="small">PRIMARY DEPTH ZONE: ${depthZone} (${season} range)</div>

<div class="out">TOP 3:</div>
<div class="small">FISH MOOD: ${mood}</div>

<div class="small">${getLureRole(0, lures[0], mood)}<br>1. ${lures[0]}</div>
<img src="${getImage(lures[0].split(' (')[0])}">

<div class="small">${getLureRole(1, lures[1], mood)}<br>2. ${lures[1]}</div>
<img src="${getImage(lures[1].split(' (')[0])}">

<div class="small">${getLureRole(2, lures[2], mood)}<br>3. ${lures[2]}</div>
<img src="${getImage(lures[2].split(' (')[0])}">

<div class="small">COLORS: ${colors.join(" • ")}</div>
<div class="small">RETRIEVE: ${retrieve}</div>
<div class="small">CONFIDENCE: ${confidence}%</div>
`;

document.getElementById("out").innerHTML =
  viewMode === "Quick" ? quickOutput : detailedOutput;
}

</script>
