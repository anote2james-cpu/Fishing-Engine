<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fishing Engine V13 Elite FULL</title>
<style>
body{font-family:Arial;background:#061018;color:#fff;margin:0;padding:12px}
.card{background:#0f1c27;border-radius:14px;padding:14px;margin-bottom:12px}
button{width:100%;padding:14px;margin-top:10px;border:none;border-radius:10px;font-weight:bold}
.primary{background:#38bdf8;color:#000}
.small{font-size:14px;color:#cbd5e1;margin:4px 0}
.out{font-size:18px;font-weight:bold;margin:8px 0}
select,input{width:100%;padding:10px;margin-top:6px;border-radius:8px;background:#08141e;color:#fff;border:none}
img{width:100%;border-radius:12px;margin:10px 0}
label{font-size:13px;color:#9fb3c8}
</style>
</head>
<body>

<div class="card">
<h3>Fishing Engine V13 Elite</h3>

<label>Lake</label>
<select id="lake">
<option>Unknown Body of Water</option>
<option>Laurel River Lake</option>
<option>Lake Cumberland</option>
<option>Wood Creek Lake</option>
<option>Kentucky Lake</option>
<option>Lake Chickamauga</option>
<option>Dale Hollow Lake</option>
<option>Lake Cherokee</option>
<option>Norris Lake</option>
<option>Lake St. Clair</option>
<option>Lake Erie</option>
<option>Guntersville Lake</option>
<option>Lake Okeechobee</option>
</select>

<label>Water Temp (°F)</label>
<input id="temp" type="number" placeholder="ex: 55">

<label>Water Clarity</label>
<select id="clarity">
<option>Clear</option>
<option>Stained</option>
<option>Dirty</option>
</select>

<label>Wind</label>
<select id="wind">
<option>Calm</option>
<option>Moderate</option>
<option>Heavy</option>
</select>

<label>Structure</label>
<select id="structure">
<option>Points</option>
<option>Flats</option>
<option>Drop-offs</option>
<option>Weedlines</option>
<option>Docks</option>
<option>Timber</option>
</select>

<label>Forage</label>
<select id="forage">
<option>Shad</option>
<option>Bluegill</option>
<option>Crawfish</option>
<option>Perch</option>
<option>Goby</option>
</select>

<label>Cloud Cover</label>
<select id="cloud">
<option>Sunny</option>
<option>Partly Cloudy</option>
<option>Overcast</option>
<option>Rainy</option>
</select>

<label>Time of Day</label>
<select id="time">
<option>Morning</option>
<option>Midday</option>
<option>Evening</option>
<option>Night</option>
</select>

<label>Pressure</label>
<select id="pressure">
<option>Rising</option>
<option>Stable</option>
<option>Falling</option>
</select>

<button class="primary" onclick="run()">THROW THIS</button>
</div>

<div id="out" class="card"></div>

<script>

function getSeason(t){
 if(t<50) return "Winter";
 if(t<60) return "Pre-Spawn";
 if(t<70) return "Spawn";
 if(t<80) return "Post-Spawn";
 return "Summer";
}

function getColors(c){
 if(c==="Clear") return ["Green Pumpkin","Watermelon Red","Natural Shad"];
 if(c==="Stained") return ["White","Chartreuse Shad","Green Pumpkin Purple"];
 return ["Black/Blue","Junebug","Black/Chartreuse"];
}

function getRetrieve(season){
 if(season==="Winter") return "Slow drag / dead stick";
 if(season==="Pre-Spawn") return "Slow roll + pauses";
 if(season==="Spawn") return "Bed fishing slow";
 if(season==="Post-Spawn") return "Medium reaction retrieve";
 return "Fast aggressive retrieve";
}

function getImage(lure){
 if(lure==="Swimbait") return "https://upload.wikimedia.org/wikipedia/commons/3/3e/Fishing_lure_swimbait.jpg";
 if(lure==="Jig") return "https://upload.wikimedia.org/wikipedia/commons/5/5a/Jig_lure.jpg";
 return "https://upload.wikimedia.org/wikipedia/commons/2/2a/Soft_plastic_lure.jpg";
}

function run(){

 let temp=parseFloat(document.getElementById("temp").value)||60;
 let clarity=document.getElementById("clarity").value;
 let wind=document.getElementById("wind").value;
 let structure=document.getElementById("structure").value;
 let forage=document.getElementById("forage").value;

 let season=getSeason(temp);
 let colors=getColors(clarity);
 let retrieve=getRetrieve(season);

 let location="";

 if(season==="Pre-Spawn") location="Secondary points leading to spawning flats";
 else if(season==="Spawn") location="Shallow bedding areas";
 else if(season==="Post-Spawn") location="First drop-offs outside flats";
 else if(season==="Summer") location="Offshore structure / grass edges";
 else location="Deep structure";

 if(wind!=="Calm") location="Wind-blown " + location;

 if(forage==="Crawfish") location+=" on rock transitions";
 if(forage==="Shad") location+=" near baitfish";

 let lures=["Swimbait","Jig","Soft Plastic"];

 let confidence=60;
 if(temp) confidence+=10;
 if(wind) confidence+=10;
 if(clarity) confidence+=10;
 confidence=Math.min(confidence,100);

 let out=document.getElementById("out");
 out.innerHTML=`
<div class="out">SEASON: ${season}</div>
<div class="out">WHERE: ${location}</div>

<div class="out">TOP 3:</div>

<div class="small">1. ${lures[0]}</div>
<img src="${getImage(lures[0])}">
<div class="small">Colors: ${colors.join(" • ")}</div>

<div class="small">2. ${lures[1]}</div>
<img src="${getImage(lures[1])}">

<div class="small">3. ${lures[2]}</div>
<img src="${getImage(lures[2])}">

<div class="small">RETRIEVE: ${retrieve}</div>
<div class="small">CONFIDENCE: ${confidence}%</div>
`;
}

</script>
</body>
</html>
